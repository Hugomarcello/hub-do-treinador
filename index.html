<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard - Hub do Treinador</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .welcome-panel { background: var(--bg-surface); border: 1px solid var(--border); padding: 20px; border-radius: 12px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .kpi-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; font-weight: 700; display: block; }
        .kpi-value { font-size: 1.5rem; font-weight: 600; color: var(--text-main); font-family: 'Kanit'; }
        .grid-4-cols { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .tat-display { font-size: 2.5rem; font-weight: 600; color: var(--primary); font-family: 'Kanit'; text-align: center; }
        
        @media (max-width: 768px) {
            .welcome-panel { flex-direction: column; text-align: center; gap: 10px; }
            .grid-4-cols { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <button class="menu-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')">
        <i class="fas fa-bars"></i>
    </button>

    <aside class="sidebar">
        <div class="brand"><i class="fas fa-terminal"></i> <span>Treinador</span></div>
        <a href="index.html" class="nav-link active"><i class="fas fa-th-large"></i> <span>Dashboard</span></a>
        <a href="diretrizes.html" class="nav-link"><i class="fas fa-dna"></i> <span>DNA da Equipe</span></a>
        <a href="elenco.html" class="nav-link"><i class="fas fa-users-gear"></i> <span>Gestão do Elenco</span></a>
        <a href="taticas.html" class="nav-link"><i class="fas fa-chess"></i> <span>Táticas e Jogos</span></a>
    </aside>

    <main class="main-content">
        <div class="welcome-panel">
            <div>
                <h1 class="page-title">Visão Executiva</h1>
                <p>Status do Save: <span style="color: var(--success); font-weight: bold;">ATIVO</span></p>
            </div>
        </div>

        <div class="grid-4-cols">
            <div class="card"><span class="kpi-label">Caixa Plantel</span><div class="kpi-value" id="hub_orcamento">R$ 0.0 M</div></div>
            <div class="card"><span class="kpi-label">Alvos Mercado</span><div class="kpi-value" id="hub_custo_lista">R$ 0.0 M</div></div>
            <div class="card"><span class="kpi-label">Teto Salarial</span><div class="kpi-value" id="hub_teto">--</div></div>
            <div class="card"><span class="kpi-label">Radar</span><div class="kpi-value" id="hub_qtd_alvos">0</div></div>
        </div>

        <div class="grid-4-cols" style="grid-template-columns: 2fr 1fr 1fr;">
            <div class="card" style="grid-column: span 2;">
                <div style="height: 200px;"><canvas id="budgetChart"></canvas></div>
            </div>
            <div class="card">
                <h3 style="text-align: center;">Tática</h3>
                <div class="tat-display" id="hub_tatica">4-4-2</div>
            </div>
            <div class="card">
                <h3>Alertas</h3>
                <div id="alertas_container" style="font-size: 0.8rem;"></div>
            </div>
        </div>
    </main>

    <script>
        window.onload = function() {
            const tatica = localStorage.getItem('galo_tat_ativa') || '442';
            document.getElementById('hub_tatica').innerText = tatica.split('').join('-');
            
            // Gráfico Simples para teste
            const ctx = document.getElementById('budgetChart').getContext('2d');
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Plantel', 'Obras', 'Base', 'Reserva'],
                    datasets: [{ data: [50, 20, 20, 10], backgroundColor: ['#10b981', '#3b82f6', '#8b5cf6', '#9BA8AB'] }]
                },
                options: { maintainAspectRatio: false }
            });
        };
    </script>
</body>
</html>
