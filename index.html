<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub do Treinador - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme"> <div class="app-container">
    
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo-wrapper">
                <i class="fas fa-shield-halved logo-icon"></i>
                <span class="logo-text">Coach<span>Hub</span></span>
            </div>
            <i class="fas fa-bars-staggered toggle-menu" onclick="toggleSidebar()"></i>
        </div>

        <nav class="nav-links">
            <a href="index.html" class="nav-item active">
                <i class="fas fa-chart-line"></i>
                <span class="nav-text">Dashboard</span>
            </a>
            <a href="diretrizes.html" class="nav-item">
                <i class="fas fa-landmark"></i>
                <span class="nav-text">O Clube</span>
            </a>
            <a href="elenco.html" class="nav-item">
                <i class="fas fa-users-viewfinder"></i>
                <span class="nav-text">Elenco</span>
            </a>
            <a href="taticas.html" class="nav-item">
                <i class="fas fa- strategy"></i> <i class="fas fa-chess-board"></i>
                <span class="nav-text">Táticas</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <button class="btn-theme" onclick="toggleTheme()">
                <i class="fas fa-moon" id="theme_icon"></i>
                <span class="nav-text" id="theme_text">Night Mode</span>
            </button>
        </div>
    </aside>

    <main class="main-content">
        <header class="main-header">
            <div class="header-info">
                <h1>Painel de Controle</h1>
                <p>Análise de desempenho e gestão de carreira.</p>
            </div>
            <div class="header-actions">
                <div class="save-status">
                    <span class="status-dot online"></span>
                    <span class="editable" onclick="makeEditable(this)">Save: Galo do Doido</span>
                </div>
                <button class="btn-sync"><i class="fas fa-sync"></i> Sincronizar</button>
            </div>
        </header>

        <div class="dashboard-grid">
            <div class="premium-card">
                <div class="card-glow"></div>
                <div class="card-content">
                    <span class="card-label">Desempenho Recente</span>
                    <div class="forma-visual">
                        <div class="dot v">V</div>
                        <div class="dot v">V</div>
                        <div class="dot e">E</div>
                        <div class="dot v">V</div>
                        <div class="dot d">D</div>
                    </div>
                </div>
            </div>

            <div class="premium-card">
                <div class="card-glow"></div>
                <div class="card-content">
                    <span class="card-label">Orçamento para Transferências</span>
                    <h2 class="money">R$ <span class="editable" onclick="makeEditable(this)">50.000.000</span></h2>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="script.js"></script>
</body>
</html>
